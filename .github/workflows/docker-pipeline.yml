name: docker-pipeline

on:
  push:
  pull_request:

env:
  DOCKER_BUILDKIT: "1"

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.img.outputs.image_tag }}
      image_latest: ${{ steps.img.outputs.image_latest }}
    steps:
      - id: img
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=ghcr.io/$repo:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=ghcr.io/$repo:latest" >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-latest
    container: hadolint/hadolint:latest-alpine
    steps:
      - uses: actions/checkout@v4
      - run: hadolint Dockerfile

  build:
    runs-on: ubuntu-latest
    needs: prep
    env:
      IMAGE_TAG: ${{ needs.prep.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t "$IMAGE_TAG" .
      - run: docker save "$IMAGE_TAG" -o image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: [prep, build]
    env:
      IMAGE_TAG: ${{ needs.prep.outputs.image_tag }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load -i image.tar
      - run: docker run --rm "$IMAGE_TAG" php -r "extension_loaded('pdo_pgsql') || exit(1);"
      - run: docker run --rm "$IMAGE_TAG" php -r "extension_loaded('rdkafka')   || exit(1);"
      - run: docker run --rm "$IMAGE_TAG" php -r "extension_loaded('redis')      || exit(1);"
      - run: docker run --rm "$IMAGE_TAG" php -r "extension_loaded('swoole')     || exit(1);"
      - run: docker run --rm "$IMAGE_TAG" php -r "extension_loaded('pcntl')      || exit(1);"
      - run: docker run --rm "$IMAGE_TAG" php -r "extension_loaded('sockets')    || exit(1);"

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
      - uses: aquasecurity/trivy-action@master
        with:
          input: image.tar
          exit-code: "1"
          severity: HIGH,CRITICAL
        env:
          TRIVY_NO_PROGRESS: "true"

  push:
    runs-on: ubuntu-latest
    needs: [prep, build, test, scan]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ needs.prep.outputs.image_tag }}
      IMAGE_LATEST: ${{ needs.prep.outputs.image_latest }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image
      - run: docker load -i image.tar
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: docker push "$IMAGE_TAG"
      - run: docker tag "$IMAGE_TAG" "$IMAGE_LATEST"
      - run: docker push "$IMAGE_LATEST"